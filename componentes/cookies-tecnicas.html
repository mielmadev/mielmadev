<!-- Modal de detalle de cookies técnicas -->
<div
  id="cookies-tecnicas-modal"
  class="cookies-modal"
  role="dialog"
  aria-modal="true"
  aria-labelledby="cookies-tecnicas-titulo"
  tabindex="-1"
  hidden
>
  <div class="cookies-modal__contenido">
    <h2 id="cookies-tecnicas-titulo">Cookies técnicas necesarias</h2>
    <p>
      Estas cookies son imprescindibles para el funcionamiento básico del sitio
      web y no pueden desactivarse.
    </p>
    <div class="tabla-responsive">
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Finalidad</th>
            <th>Duración</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td data-label="Nombre" style="text-align: left">
              cookies_consentimiento
            </td>
            <td data-label="Finalidad" style="text-align: left">
              Guardar la preferencia del usuario sobre el consentimiento de
              cookies
            </td>
            <td data-label="Duración" style="text-align: left">1 año</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="cookies-modal__acciones">
      <button
        type="button"
        id="cookies-tecnicas-volver"
        class="btn btn-enlaces configurar"
      >
        Volver
      </button>
    </div>
  </div>
</div>
